<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saminov School – Sertifikat tizimi (rasm yuklash)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 10px 30px rgba(0,20,50,0.1);
            max-width: 900px;
            width: 100%;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        h1 {
            color: #1a2b4c;
            margin-bottom: 8px;
            font-size: 32px;
            text-align: center;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #4a5b7a;
            margin-bottom: 30px;
            font-size: 16px;
            text-align: center;
            font-weight: 400;
        }
        .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1e2b4f, #2c3e6e);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            color: #ffd966;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid #dbe4ee;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            background: white;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .input-group input:focus {
            border-color: #1e2b4f;
            box-shadow: 0 0 0 4px rgba(30,43,79,0.1);
        }
        .input-group button {
            padding: 16px 35px;
            background: linear-gradient(145deg, #1e2b4f, #2c3e6e);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            box-shadow: 0 8px 16px rgba(0,20,50,0.2);
        }
        .input-group button:hover {
            background: linear-gradient(145deg, #2c3e6e, #1e2b4f);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,20,50,0.3);
        }
        .qr-section {
            margin: 30px 0;
            padding: 25px;
            border-radius: 30px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .qr-section h3 {
            margin-bottom: 20px;
            color: #1a2b4c;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        #qr-reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #1a2b4c;
            min-height: 220px;
            border: 2px solid white;
        }
        #qr-result {
            margin-top: 15px;
            font-weight: 500;
            color: #1a2b4c;
            text-align: center;
            background: #e9f0f9;
            padding: 12px;
            border-radius: 60px;
        }
        .result-card {
            margin-top: 40px;
            display: none;
        }
        .result-card.show {
            display: block;
        }

        /* --- SERTIFIKAT DIZAYNI (rasm qo'shilgan) --- */
        .certificate-wrapper {
            background: linear-gradient(145deg, #ffffff, #f8faff);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 30px 50px rgba(0,20,40,0.2), inset 0 2px 5px rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.9);
            position: relative;
            overflow: hidden;
        }
        .certificate-wrapper::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(30,43,79,0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        .certificate-wrapper::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        .certificate-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px dashed #d0ddeb;
            padding-bottom: 20px;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }
        .certificate-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .certificate-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .certificate-title {
            flex: 1;
        }
        .certificate-title h2 {
            font-size: 32px;
            color: #1e2b4f;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .certificate-title p {
            color: #5a6b8a;
            font-size: 16px;
            font-weight: 400;
        }
        .certificate-body {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 15px 0;
        }
        .certificate-label {
            color: #2c3e6e;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            opacity: 0.7;
        }
        .certificate-name {
            font-size: 42px;
            font-weight: 700;
            color: #1e2b4f;
            margin-bottom: 10px;
            line-height: 1.2;
            word-break: break-word;
            background: linear-gradient(145deg, #1e2b4f, #2c3e6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .certificate-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 30px;
            margin: 30px 0 20px;
            text-align: left;
            background: rgba(255,255,255,0.6);
            padding: 25px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .detail-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1e2b4f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .detail-text {
            flex: 1;
        }
        .detail-text strong {
            display: block;
            font-size: 14px;
            color: #5a6b8a;
            font-weight: 400;
        }
        .detail-text span {
            font-size: 18px;
            font-weight: 600;
            color: #1a2b4c;
        }
        .certificate-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #d0ddeb;
            position: relative;
            z-index: 2;
        }
        .signature {
            text-align: center;
        }
        .signature span {
            font-family: 'Brush Script MT', cursive;
            font-size: 28px;
            color: #1e2b4f;
            display: block;
            margin-bottom: 5px;
        }
        .signature small {
            color: #7a8aa9;
            font-size: 14px;
        }
        .certificate-badge {
            background: #ffd966;
            color: #1e2b4f;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(255,215,0,0.4);
        }
        .download-btn {
            background: white;
            border: 2px solid #1e2b4f;
            color: #1e2b4f;
            padding: 12px 25px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .download-btn:hover {
            background: #1e2b4f;
            color: white;
        }
        .not-found {
            background: #fee;
            color: #b33;
            text-align: center;
            padding: 30px;
            border-radius: 40px;
            font-size: 20px;
            border: 2px solid #fbb;
        }

        /* O‘qituvchi paneli */
        .teacher-panel {
            margin-top: 50px;
            border-top: 2px solid rgba(30,43,79,0.2);
            padding-top: 30px;
        }
        .teacher-panel h2 {
            color: #1e2b4f;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }
        .teacher-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
            background: #f0f5fd;
            padding: 25px;
            border-radius: 30px;
        }
        .teacher-login .input-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .teacher-login .input-row input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #dbe4ee;
            border-radius: 60px;
            font-size: 15px;
        }
        .teacher-login .input-row button {
            padding: 14px 30px;
            background: #1e2b4f;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
        }
        .login-message {
            color: #b33;
            font-size: 14px;
            min-height: 20px;
        }
        .add-form {
            background: #ffffffdd;
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 40px;
            margin-top: 20px;
            display: none;
            border: 1px solid white;
        }
        .add-form.visible {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1e2b4f;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e8f0;
            border-radius: 30px;
            font-size: 15px;
            background: white;
        }
        .form-group input[type="file"] {
            padding: 10px;
            background: #f8fafd;
        }
        .add-form button {
            padding: 16px 20px;
            background: linear-gradient(145deg, #1e2b4f, #2c3e6e);
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
        }
        .footer {
            margin-top: 40px;
            color: #7a8aa9;
            font-size: 14px;
            text-align: center;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 30px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
    <!-- QR kodni o‘qish uchun jsQR library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <!-- html2canvas (rasm sifatida yuklab olish uchun) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">🎓</div>
        <h1>Saminov School</h1>
        <div class="subtitle">Sertifikatlar tekshirish va boshqarish tizimi</div>

        <!-- SERTIFIKAT TEKSHIRISH (OCHIQ QISM) -->
        <div class="input-group">
            <input type="text" id="certId" placeholder="Sertifikat ID raqamini kiriting (masalan: SAM2024001)" value="">
            <button id="checkBtn">Tekshirish</button>
        </div>

        <div class="qr-section">
            <h3>📷 QR kod orqali tekshirish</h3>
            <div id="qr-reader"></div>
            <div id="qr-result"></div>
            <button id="startScanBtn" style="margin-top: 15px; padding: 12px 25px; background: #1e2b4f; color: white; border: none; border-radius: 60px; cursor: pointer; font-weight: 500;">Kamerani yoqish</button>
            <button id="stopScanBtn" style="margin-top: 15px; padding: 12px 25px; background: #b33; color: white; border: none; border-radius: 60px; cursor: pointer; display: none;">To'xtatish</button>
        </div>

        <!-- NATIJA KARTASI (SERTIFIKAT DIZAYNI) -->
        <div id="resultCard" class="result-card">
            <div id="certificateContainer"></div>
            <button id="downloadCertBtn" class="download-btn">⬇️ Sertifikatni rasm sifatida yuklab olish</button>
        </div>

        <!-- O‘QITUVCHI PANELI (RASM YUKLASH ILOVA QILINGAN) -->
        <div class="teacher-panel">
            <h2>
                <span>👨‍🏫 O‘qituvchi paneli</span>
                <button id="toggleTeacherBtn" style="padding: 10px 20px; background: #1e2b4f; color: white; border: none; border-radius: 60px; cursor: pointer;">Panelni ochish</button>
            </h2>

            <!-- Kirish formasi (parol) -->
            <div id="teacherLogin" class="teacher-login" style="display: none;">
                <div class="input-row">
                    <input type="password" id="teacherPassword" placeholder="Parolni kiriting">
                    <button id="loginTeacherBtn">Kirish</button>
                </div>
                <div id="loginMessage" class="login-message"></div>
            </div>

            <!-- Sertifikat qo‘shish formasi (faqat login bo‘lganda ko‘rinadi) -->
            <div id="addForm" class="add-form">
                <h3 style="margin-bottom: 20px;">Yangi sertifikat qo‘shish</h3>
                <div class="form-group">
                    <label>Sertifikat ID</label>
                    <input type="text" id="newId" placeholder="Masalan: SAM2024005" required>
                </div>
                <div class="form-group">
                    <label>O‘quvchi F.I.O.</label>
                    <input type="text" id="newFullName" placeholder="Familiya Ism" required>
                </div>
                <div class="form-group">
                    <label>Kurs nomi (tanlov)</label>
                    <input type="text" id="newCourse" value="Kompyuter savodxonligi Web dasturlash" required>
                </div>
                <div class="form-group">
                    <label>Berilgan sana</label>
                    <input type="date" id="newDate" required>
                </div>
                <div class="form-group">
                    <label>Baho</label>
                    <select id="newGrade">
                        <option value="A'lo">A'lo</option>
                        <option value="Yaxshi">Yaxshi</option>
                        <option value="Qoniqarli">Qoniqarli</option>
                        <option value="Qoniqarsiz">Qoniqarsiz</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mentor</label>
                    <input type="text" id="newMentor" value="Valiyev OMadbek" required>
                </div>
                <div class="form-group">
                    <label>Rasm yuklash (ixtiyoriy)</label>
                    <input type="file" id="newImage" accept="image/*">
                    <small style="color: #7a8aa9; display: block; margin-top: 5px;">JPG, PNG, GIF (maksimal 2 MB)</small>
                </div>
                <button id="addCertificateBtn">Qo‘shish</button>
                <div id="formMessage" class="message"></div>
                <hr style="margin: 25px 0;">
                <button id="logoutTeacherBtn" style="background: #b33;">Chiqish</button>
            </div>
        </div>

        <div class="footer">
            © 2025 Saminov School. Barcha huquqlar himoyalangan.
        </div>
    </div>

    <script>
        // localStorage dan ma'lumotlarni o‘qish
        let certificates = {};

        // Standart rasm (agar foydalanuvchi rasm yuklamasa)
        const defaultImage = "https://img.icons8.com/fluency/96/000000/school.png";

        const defaultCertificates = {
            "SAM2024001": {
                fullName: "Aliyev Vali",
                course: "Kompyuter savodxonligi Web dasturlash",
                issueDate: "2025-03-15",
                grade: "A'lo",
                mentor: "Valiyev OMadbek",
                image: defaultImage
            },
            "SAM2024002": {
                fullName: "Karimova Dilbar",
                course: "Kompyuter savodxonligi Web dasturlash",
                issueDate: "2025-03-15",
                grade: "Yaxshi",
                mentor: "Valiyev OMadbek",
                image: defaultImage
            },
            "SAM2024003": {
                fullName: "Nazarov Shavkat",
                course: "Kompyuter savodxonligi Web dasturlash",
                issueDate: "2025-03-16",
                grade: "A'lo",
                mentor: "Valiyev OMadbek",
                image: defaultImage
            },
            "SAM2024004": {
                fullName: "Rahimova Zuhra",
                course: "Kompyuter savodxonligi Web dasturlash",
                issueDate: "2025-03-16",
                grade: "Qoniqarli",
                mentor: "Valiyev OMadbek",
                image: defaultImage
            }
        };

        function loadCertificates() {
            const stored = localStorage.getItem('saminovCertificates');
            if (stored) {
                try { certificates = JSON.parse(stored); } 
                catch { certificates = {}; }
            } else {
                certificates = defaultCertificates;
                saveCertificates();
            }
        }
        function saveCertificates() {
            localStorage.setItem('saminovCertificates', JSON.stringify(certificates));
        }
        loadCertificates();

        // DOM elementlar
        const certIdInput = document.getElementById('certId');
        const checkBtn = document.getElementById('checkBtn');
        const resultCard = document.getElementById('resultCard');
        const certificateContainer = document.getElementById('certificateContainer');
        const downloadBtn = document.getElementById('downloadCertBtn');
        const startScanBtn = document.getElementById('startScanBtn');
        const stopScanBtn = document.getElementById('stopScanBtn');
        const qrReader = document.getElementById('qr-reader');
        const qrResult = document.getElementById('qr-result');
        const toggleTeacherBtn = document.getElementById('toggleTeacherBtn');
        const teacherLoginDiv = document.getElementById('teacherLogin');
        const addForm = document.getElementById('addForm');
        const loginTeacherBtn = document.getElementById('loginTeacherBtn');
        const teacherPassword = document.getElementById('teacherPassword');
        const loginMessage = document.getElementById('loginMessage');
        const logoutTeacherBtn = document.getElementById('logoutTeacherBtn');
        const addCertificateBtn = document.getElementById('addCertificateBtn');
        const formMessage = document.getElementById('formMessage');
        const newId = document.getElementById('newId');
        const newFullName = document.getElementById('newFullName');
        const newCourse = document.getElementById('newCourse');
        const newDate = document.getElementById('newDate');
        const newGrade = document.getElementById('newGrade');
        const newMentor = document.getElementById('newMentor');
        const newImage = document.getElementById('newImage');

        const TEACHER_PASSWORD = 'saminov2025';
        let loggedIn = false;

        // Sertifikatni chiroyli qilib ko‘rsatish (yuklangan rasm bilan)
        function displayCertificate(id, data) {
            const imageSrc = data.image || defaultImage;
            const html = `
                <div class="certificate-wrapper" id="certificateForDownload">
                    <div class="certificate-header">
                        <div class="certificate-image">
                            <img src="${imageSrc}" alt="Rasm">
                        </div>
                        <div class="certificate-title">
                            <h2>SAMINOV SCHOOL</h2>
                            <p>Rasmiy sertifikat</p>
                        </div>
                    </div>
                    <div class="certificate-body">
                        <div class="certificate-label">Ushbu sertifikat bilan taqdirlanadi</div>
                        <div class="certificate-name">${data.fullName}</div>
                        <div class="certificate-details">
                            <div class="detail-item">
                                <div class="detail-icon">📚</div>
                                <div class="detail-text">
                                    <strong>Tanlov</strong>
                                    <span>${data.course}</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-icon">📅</div>
                                <div class="detail-text">
                                    <strong>Sana</strong>
                                    <span>${data.issueDate}</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-icon">⭐</div>
                                <div class="detail-text">
                                    <strong>Baho</strong>
                                    <span>${data.grade}</span>
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-icon">🆔</div>
                                <div class="detail-text">
                                    <strong>ID</strong>
                                    <span>${id}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="certificate-footer">
                        <div class="signature">
                            <span>${data.mentor}</span>
                            <small>Mentor</small>
                        </div>
                        <div class="certificate-badge">★ HAQIQIY ★</div>
                    </div>
                </div>
            `;
            certificateContainer.innerHTML = html;
            resultCard.classList.add('show');
        }

        // Sertifikatni tekshirish
        function checkCertificate(id) {
            const certId = id.trim().toUpperCase();
            const data = certificates[certId];
            if (data) {
                displayCertificate(certId, data);
                qrResult.innerHTML = '';
            } else {
                certificateContainer.innerHTML = `<div class="not-found">❌ Sertifikat topilmadi! ID: ${certId}</div>`;
                resultCard.classList.add('show');
            }
        }

        checkBtn.addEventListener('click', () => {
            const id = certIdInput.value;
            if (id) checkCertificate(id);
            else alert('Iltimos, sertifikat ID raqamini kiriting.');
        });
        certIdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkBtn.click();
        });

        // QR skanerlash
        let scanning = false, videoStream = null, animationFrame = null;
        startScanBtn.addEventListener('click', async () => {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const video = document.createElement('video');
                video.srcObject = videoStream;
                video.setAttribute('playsinline', true);
                video.play();

                qrReader.innerHTML = '';
                qrReader.appendChild(video);

                scanning = true;
                startScanBtn.style.display = 'none';
                stopScanBtn.style.display = 'inline-block';

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');

                function scanFrame() {
                    if (!scanning) return;
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: "dontInvert" });
                        if (code) {
                            qrResult.innerHTML = `✅ QR kod o‘qildi: <strong>${code.data}</strong>`;
                            certIdInput.value = code.data;
                            checkCertificate(code.data);
                        } else {
                            qrResult.innerHTML = 'QR kod topilmadi...';
                        }
                    }
                    animationFrame = requestAnimationFrame(scanFrame);
                }
                animationFrame = requestAnimationFrame(scanFrame);
            } catch (err) {
                alert('Kamerani ishga tushirib bo‘lmadi: ' + err.message);
            }
        });

        function stopScan() {
            scanning = false;
            if (animationFrame) cancelAnimationFrame(animationFrame);
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            qrReader.innerHTML = '';
            startScanBtn.style.display = 'inline-block';
            stopScanBtn.style.display = 'none';
            qrResult.innerHTML = '';
        }
        stopScanBtn.addEventListener('click', stopScan);
        window.addEventListener('beforeunload', stopScan);

        // Sertifikatni rasm sifatida yuklab olish
        downloadBtn.addEventListener('click', function() {
            const certElement = document.getElementById('certificateForDownload');
            if (!certElement) {
                alert('Avval sertifikatni tekshiring!');
                return;
            }
            html2canvas(certElement, {
                scale: 2,
                backgroundColor: null,
                allowTaint: false,
                useCORS: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `saminov_sertifikat_${certIdInput.value.trim() || 'nomalum'}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert('Rasm yaratishda xatolik: ' + err);
            });
        });

        // O‘qituvchi paneli logikasi
        toggleTeacherBtn.addEventListener('click', () => {
            if (teacherLoginDiv.style.display === 'none') {
                teacherLoginDiv.style.display = 'flex';
                teacherPassword.focus();
            } else {
                teacherLoginDiv.style.display = 'none';
                loginMessage.textContent = '';
            }
        });

        teacherPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginTeacherBtn.click();
        });

        loginTeacherBtn.addEventListener('click', () => {
            if (teacherPassword.value === TEACHER_PASSWORD) {
                loggedIn = true;
                teacherLoginDiv.style.display = 'none';
                addForm.classList.add('visible');
                loginMessage.textContent = '';
                teacherPassword.value = '';
            } else {
                loginMessage.textContent = '❌ Parol noto‘g‘ri!';
                teacherPassword.value = '';
                teacherPassword.focus();
            }
        });

        logoutTeacherBtn.addEventListener('click', () => {
            loggedIn = false;
            addForm.classList.remove('visible');
            teacherLoginDiv.style.display = 'flex';
            teacherPassword.value = '';
            loginMessage.textContent = '';
        });

        // Yangi sertifikat qo‘shish (rasm bilan)
        addCertificateBtn.addEventListener('click', () => {
            const id = newId.value.trim().toUpperCase();
            const fullName = newFullName.value.trim();
            const course = newCourse.value.trim();
            const date = newDate.value;
            const grade = newGrade.value;
            const mentor = newMentor.value.trim();

            if (!id || !fullName || !course || !date || !mentor) {
                formMessage.className = 'message error';
                formMessage.textContent = 'Barcha maydonlarni to‘ldiring!';
                return;
            }
            if (certificates[id]) {
                formMessage.className = 'message error';
                formMessage.textContent = 'Bu ID allaqachon mavjud!';
                return;
            }

            // Rasmni qayta ishlash
            const file = newImage.files[0];
            if (file) {
                // Rasm hajmini tekshirish (2 MB dan kichik)
                if (file.size > 2 * 1024 * 1024) {
                    formMessage.className = 'message error';
                    formMessage.textContent = 'Rasm hajmi 2 MB dan kichik bo‘lishi kerak!';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;
                    certificates[id] = { 
                        fullName, 
                        course, 
                        issueDate: date, 
                        grade, 
                        mentor,
                        image: imageData 
                    };
                    saveCertificates();
                    formMessage.className = 'message success';
                    formMessage.textContent = 'Sertifikat qo‘shildi!';
                    // Formani tozalash
                    newId.value = ''; newFullName.value = ''; newCourse.value = 'Kompyuter savodxonligi Web dasturlash'; 
                    newDate.value = ''; newGrade.value = 'A\'lo'; newMentor.value = 'Valiyev OMadbek';
                    newImage.value = '';
                };
                reader.readAsDataURL(file);
            } else {
                // Rasm yuklanmagan bo'lsa, default rasmni ishlatamiz
                certificates[id] = { 
                    fullName, 
                    course, 
                    issueDate: date, 
                    grade, 
                    mentor,
                    image: defaultImage 
                };
                saveCertificates();
                formMessage.className = 'message success';
                formMessage.textContent = 'Sertifikat qo‘shildi!';
                // Formani tozalash
                newId.value = ''; newFullName.value = ''; newCourse.value = 'Kompyuter savodxonligi Web dasturlash'; 
                newDate.value = ''; newGrade.value = 'A\'lo'; newMentor.value = 'Valiyev OMadbek';
                newImage.value = '';
            }
        });

        // Sanani avtomatik to‘ldirish
        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            newDate.value = today;
        }
        setDefaultDate();
    </script>
